# GPIO (arcade button + status LED)
CONFIG_GPIO=y

# Networking / OpenThread
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=n
CONFIG_NET_TCP=n
CONFIG_IEEE802154=y
CONFIG_NET_L2_OPENTHREAD=y

# Thread는 셸에서 dataset을 넣어 기존 네트워크에 조인한다.
# (부팅 시 저장된 dataset이 있으면 main()이 자동으로 재시작)
CONFIG_OPENTHREAD_MANUAL_START=y

# OpenThread 내장 CoAP API (otCoap*)
CONFIG_OPENTHREAD_COAP=y

# `ot ...` 셸 명령으로 네트워크 조인/디버깅
CONFIG_SHELL=y
CONFIG_OPENTHREAD_SHELL=y

# Thread 자격 증명(dataset) 영속 저장 → 재부팅 후 자동 재조인
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Logging
CONFIG_LOG=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_SHELL_STACK_SIZE=4096
